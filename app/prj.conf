CONFIG_PRINTK=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ASSERT=y

# Enable GPIO for heartbeat LED
CONFIG_GPIO=y

# Async UART support
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=n
# Interrupt-driven UART is enabled by the driver; no explicit Kconfig needed
# Increase main stack as we add protocol thread
CONFIG_MAIN_STACK_SIZE=3072
# Provide more headroom for ISR stack on H7
CONFIG_ISR_STACK_SIZE=4096

# Ensure no console hooks intercept RX; protocol owns UART fully
CONFIG_UART_CONSOLE_DEBUG_SERVER_HOOKS=n

# File system + SD card (FATFS over SDMMC)
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_DISK_DRIVER_SDMMC=y
# Hardware flow control on STM32 SDMMC can improve stability on some boards
CONFIG_SDMMC_STM32_HWFC=y

# Enable Long File Names (LFN)
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_BSS=y
CONFIG_FS_FATFS_MAX_LFN=255

# Provide a nocache RAM section for DMA-safe buffers and, during bring-up,
# disable D-Cache to avoid SDMMC coherency issues on H7 which can manifest as
# hard faults very early when the SD driver probes.
CONFIG_NOCACHE_MEMORY=y
CONFIG_DCACHE=n

# Enable Zephyr CRC32 library (IEEE)
CONFIG_CRC=y

# Display (LTDC + MIPI DSI + OTM8009A panel via shield)
CONFIG_DISPLAY=y
CONFIG_MIPI_DSI=y
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

# Reboot API for cmd_reboot
CONFIG_REBOOT=y
